---
# ─── Zabbix Server HA Cluster 設定変数 ───────────────────────────────────────
# 機密情報 (zabbix_db_password) は ansible/secrets/zabbix_vault.yml で管理すること。

zabbix_version: "7.0"
zabbix_server_port: 10051

# DB 接続先は HAProxy VIP
zabbix_db_host: "192.168.11.200"
zabbix_db_port: 5432
zabbix_db_name: "zabbix"
zabbix_db_user: "zabbix"
# zabbix_db_password: ansible/secrets/zabbix_vault.yml で定義

# HA クラスタ設定
zabbix_ha_failover_delay: "60s"

# パフォーマンスチューニング（小〜中規模監視向け）
zabbix_cache_size: "64M"
zabbix_history_cache_size: "32M"
zabbix_trend_cache_size: "8M"
zabbix_value_cache_size: "32M"
zabbix_start_pollers: 10
zabbix_start_pollers_unreachable: 5
zabbix_start_pingers: 5
zabbix_start_discoverers: 5
zabbix_start_http_pollers: 5
