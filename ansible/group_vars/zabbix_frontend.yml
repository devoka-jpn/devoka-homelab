---
# ─── Zabbix Frontend (Nginx + PHP-FPM) 設定変数 ──────────────────────────────
# 機密情報 (zabbix_db_password) は ansible/secrets/zabbix_vault.yml で管理すること。

zabbix_version: "7.0"
zabbix_frontend_port: 8080

# DB 接続先は HAProxy VIP
zabbix_db_host: "192.168.11.200"
zabbix_db_port: 5432
zabbix_db_name: "zabbix"
zabbix_db_user: "zabbix"
# zabbix_db_password: ansible/secrets/zabbix_vault.yml で定義

# Zabbix Server 接続先（HAProxy VIP 経由）
zabbix_server_vip: "192.168.11.200"
zabbix_server_port: 10051
zabbix_server_name: "Devoka Homelab Zabbix"

# PHP 設定
php_version: "8.2"
php_max_execution_time: 300
php_memory_limit: "128M"
php_post_max_size: "16M"
php_upload_max_filesize: "2M"
php_max_input_time: 300
php_date_timezone: "Asia/Tokyo"
