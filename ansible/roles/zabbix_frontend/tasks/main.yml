---
# 前提パッケージ
- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ufw
      - acl
    state: present
    update_cache: true
  become: true

# --- APT リポジトリ ---
- name: Download Zabbix repository package
  ansible.builtin.get_url:
    url: "https://repo.zabbix.com/zabbix/{{ zabbix_version }}/ubuntu/pool/main/z/zabbix-release/zabbix-release_{{ zabbix_version }}-1+ubuntu{{ ansible_distribution_version }}_all.deb"
    dest: /tmp/zabbix-release.deb
    mode: "0644"
  become: true

- name: Install Zabbix repository package
  ansible.builtin.apt:
    deb: /tmp/zabbix-release.deb
    state: present
  become: true

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0
  become: true

# --- パッケージインストール ---
- name: Install nginx, PHP-FPM, Zabbix frontend packages
  ansible.builtin.apt:
    name:
      - "{{ nginx_package }}"
      - "{{ php_fpm_package }}"
      - "{{ zabbix_frontend_package }}"
      - zabbix-nginx-conf
      - zabbix-agent2
    state: present
  become: true

# --- PHP-FPM 設定 ---
- name: Set date.timezone in PHP-FPM www.conf
  ansible.builtin.lineinfile:
    path: /etc/php/{{ php_version }}/fpm/pool.d/www.conf
    regexp: '^;?php_admin_value\[date\.timezone\]'
    line: "php_admin_value[date.timezone] = {{ php_date_timezone }}"
    state: present
  become: true
  notify: restart php-fpm

- name: Set PHP max_execution_time
  ansible.builtin.lineinfile:
    path: /etc/php/{{ php_version }}/fpm/php.ini
    regexp: '^max_execution_time\s*='
    line: "max_execution_time = {{ php_max_execution_time }}"
    state: present
  become: true
  notify: restart php-fpm

- name: Set PHP memory_limit
  ansible.builtin.lineinfile:
    path: /etc/php/{{ php_version }}/fpm/php.ini
    regexp: '^memory_limit\s*='
    line: "memory_limit = {{ php_memory_limit }}"
    state: present
  become: true
  notify: restart php-fpm

- name: Set PHP post_max_size
  ansible.builtin.lineinfile:
    path: /etc/php/{{ php_version }}/fpm/php.ini
    regexp: '^post_max_size\s*='
    line: "post_max_size = {{ php_post_max_size }}"
    state: present
  become: true
  notify: restart php-fpm

- name: Set PHP upload_max_filesize
  ansible.builtin.lineinfile:
    path: /etc/php/{{ php_version }}/fpm/php.ini
    regexp: '^upload_max_filesize\s*='
    line: "upload_max_filesize = {{ php_upload_max_filesize }}"
    state: present
  become: true
  notify: restart php-fpm

- name: Set PHP max_input_time
  ansible.builtin.lineinfile:
    path: /etc/php/{{ php_version }}/fpm/php.ini
    regexp: '^max_input_time\s*='
    line: "max_input_time = {{ php_max_input_time }}"
    state: present
  become: true
  notify: restart php-fpm

# --- Nginx vhost 設定 ---
- name: Deploy nginx vhost for Zabbix
  ansible.builtin.template:
    src: nginx_zabbix.conf.j2
    dest: /etc/nginx/sites-available/zabbix
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: reload nginx

- name: Create symlink for nginx zabbix site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/zabbix
    dest: /etc/nginx/sites-enabled/zabbix
    state: link
    owner: root
    group: root
  become: true
  notify: reload nginx

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  become: true
  notify: reload nginx

# --- Zabbix フロントエンド PHP 設定 ---
- name: Ensure zabbix conf directory exists
  ansible.builtin.file:
    path: /usr/share/zabbix/conf
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  become: true

- name: Deploy zabbix.conf.php
  ansible.builtin.template:
    src: zabbix.conf.php.j2
    dest: /usr/share/zabbix/conf/zabbix.conf.php
    owner: www-data
    group: www-data
    mode: "0640"
  become: true

# --- zabbix_server_addresses (自己監視用 agent2 設定) ---
- name: Set zabbix_server_addresses for agent2
  ansible.builtin.set_fact:
    zabbix_server_addresses: >-
      {{ groups['zabbix_server']
         | map('extract', hostvars, ['ansible_default_ipv4', 'address'])
         | select('defined')
         | list
         | join(',') }}

- name: Deploy zabbix_agent2.conf for self-monitoring
  ansible.builtin.template:
    src: zabbix_agent2.conf.j2
    dest: /etc/zabbix/zabbix_agent2.conf
    owner: root
    group: zabbix
    mode: "0640"
  become: true
  notify: restart zabbix-agent2

# --- サービス有効化・起動 ---
- name: Enable and start nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Enable and start php{{ php_version }}-fpm
  ansible.builtin.systemd:
    name: php{{ php_version }}-fpm
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Enable and start zabbix-agent2
  ansible.builtin.systemd:
    name: zabbix-agent2
    enabled: true
    state: started
    daemon_reload: true
  become: true

# --- ufw ルール ---
- name: Allow Zabbix frontend port from LAN
  community.general.ufw:
    rule: allow
    port: "{{ zabbix_frontend_port }}"
    proto: tcp
    src: 192.168.0.0/16
    comment: "Zabbix Frontend"
  become: true
