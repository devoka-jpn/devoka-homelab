---
kea_packages:
  - isc-kea-dhcp4
  - isc-kea-dhcp-ddns
  - isc-kea-ctrl-agent
  - isc-kea-hooks

kea_config_dir: /etc/kea
kea_log_dir: /var/log/kea
kea_lease_dir: /var/lib/kea
kea_run_dir: /run/kea

# HA ピアの URL テンプレート
kea_peer_primary_url: "http://{{ dns_primary_ip }}:8000/"
kea_peer_secondary_url: "http://{{ dns_secondary_ip }}:8000/"

# Kea フック共有ライブラリのディレクトリ
# Ubuntu/x86_64 の標準パス（バージョンや OS により異なる場合は上書きすること）
kea_hooks_dir: /usr/lib/x86_64-linux-gnu/kea/hooks
