---
- name: restart haproxy
  ansible.builtin.systemd:
    name: haproxy
    state: restarted
  become: true

- name: reload haproxy
  ansible.builtin.systemd:
    name: haproxy
    state: reloaded
  become: true

- name: restart keepalived
  ansible.builtin.systemd:
    name: keepalived
    state: restarted
  become: true

- name: reload keepalived
  ansible.builtin.systemd:
    name: keepalived
    state: reloaded
  become: true

- name: restart etcd
  ansible.builtin.systemd:
    name: etcd
    state: restarted
  become: true

- name: reload etcd
  ansible.builtin.systemd:
    name: etcd
    state: reloaded
  become: true

- name: systemd daemon-reload
  ansible.builtin.systemd:
    daemon_reload: true
  become: true
