---
all:
  children:
    proxmox_nodes:
      hosts:
        hip1tk-ppprox01:
          ansible_host: 192.168.11.11
        hip1tk-ppprox02:
          ansible_host: 192.168.11.12
        hip1tk-ppprox03:
          ansible_host: 192.168.11.13
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519"

    dns_servers:
      hosts:
        hip1tk-pvdns01:
          ansible_host: 192.168.11.53
        hip1tk-pvdns02:
          ansible_host: 192.168.11.54
      vars:
        ansible_user: bind-user
        ansible_ssh_private_key_file: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519"
        ansible_become: true

    management_vms:
      hosts:
        hip1tk-pvdesk01:
          ansible_host: "{{ hostvars['hip1tk-pvdesk01']['ansible_default_ipv4']['address'] | default('192.168.11.100') }}"
      vars:
        ansible_user: "{{ lookup('env', 'USER') }}"
        ansible_ssh_private_key_file: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519"
        ansible_connection: local

    # ─── Zabbix 冗長構成 VM ───────────────────────────────────────────────
    # 全 VM は DHCP で IP を取得し、DDNS により <hostname>.devoka-jpn.com で解決される。
    # ansible_host には DDNS 登録された FQDN を使用する。

    zabbix_lb:
      hosts:
        hip1tk-pvzbxlb01:
          ansible_host: hip1tk-pvzbxlb01.devoka-jpn.com
          keepalived_state: MASTER
          keepalived_priority: 110
          etcd_node_name: etcd-lb01
        hip1tk-pvzbxlb02:
          ansible_host: hip1tk-pvzbxlb02.devoka-jpn.com
          keepalived_state: BACKUP
          keepalived_priority: 100
          etcd_node_name: etcd-lb02
      vars:
        ansible_user: zabbix-user
        ansible_ssh_private_key_file: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519"
        ansible_become: true

    zabbix_server:
      hosts:
        hip1tk-pvzbxsv01:
          ansible_host: hip1tk-pvzbxsv01.devoka-jpn.com
          zabbix_ha_node_name: zabbix-node-01
          etcd_node_name: etcd-sv01
        hip1tk-pvzbxsv02:
          ansible_host: hip1tk-pvzbxsv02.devoka-jpn.com
          zabbix_ha_node_name: zabbix-node-02
      vars:
        ansible_user: zabbix-user
        ansible_ssh_private_key_file: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519"
        ansible_become: true

    zabbix_frontend:
      hosts:
        hip1tk-pvzbxfe01:
          ansible_host: hip1tk-pvzbxfe01.devoka-jpn.com
        hip1tk-pvzbxfe02:
          ansible_host: hip1tk-pvzbxfe02.devoka-jpn.com
      vars:
        ansible_user: zabbix-user
        ansible_ssh_private_key_file: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519"
        ansible_become: true

    zabbix_db:
      hosts:
        hip1tk-pvzbxdb01:
          ansible_host: hip1tk-pvzbxdb01.devoka-jpn.com
          patroni_role: primary
        hip1tk-pvzbxdb02:
          ansible_host: hip1tk-pvzbxdb02.devoka-jpn.com
          patroni_role: replica
      vars:
        ansible_user: zabbix-user
        ansible_ssh_private_key_file: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519"
        ansible_become: true

    # Zabbix 全コンポーネントを束ねるグループ（変数共有用）
    zabbix_all:
      children:
        zabbix_lb: {}
        zabbix_server: {}
        zabbix_frontend: {}
        zabbix_db: {}
